version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
      - ALLOWED_ORIGINS=["http://localhost:3000","http://localhost:5500","null"]
    volumes:
      - ./backend/data:/app/data:ro
      - ./backend/uploads:/app/uploads
    redis:
      image: redis:7-alpine
      ports:
      - "6379:6379"
      restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: unless-stopped